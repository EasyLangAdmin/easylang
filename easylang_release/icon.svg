<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>

    <!-- Logo accent gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e94560"/>
      <stop offset="50%"  stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#f7d794"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path for rounded rectangle -->
    <clipPath id="roundClip">
      <rect x="0" y="0" width="256" height="256" rx="48" ry="48"/>
    </clipPath>
  </defs>

  <!-- Rounded background -->
  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#fff" stroke-width="1" clip-path="url(#roundClip)">
    <line x1="0"   y1="64"  x2="256" y2="64"/>
    <line x1="0"   y1="128" x2="256" y2="128"/>
    <line x1="0"   y1="192" x2="256" y2="192"/>
    <line x1="64"  y1="0"   x2="64"  y2="256"/>
    <line x1="128" y1="0"   x2="128" y2="256"/>
    <line x1="192" y1="0"   x2="192" y2="256"/>
  </g>

  <!-- Glowing orb behind logo -->
  <ellipse cx="128" cy="112" rx="70" ry="70" fill="#e94560" opacity="0.12" filter="url(#glow)"/>

  <!-- Main "EL" monogram -->
  <!-- E -->
  <g filter="url(#glow)">
    <rect x="54"  y="76"  width="8"  height="68" rx="3" fill="url(#logoGrad)"/>
    <rect x="54"  y="76"  width="46" height="8"  rx="3" fill="url(#logoGrad)"/>
    <rect x="54"  y="106" width="34" height="8"  rx="3" fill="url(#logoGrad)"/>
    <rect x="54"  y="136" width="46" height="8"  rx="3" fill="url(#logoGrad)"/>
  </g>

  <!-- 1 numeral (EL1) -->
  <g filter="url(#glow)">
    <rect x="115" y="76"  width="8"  height="68" rx="3" fill="url(#logoGrad)"/>
    <rect x="108" y="76"  width="8"  height="8"  rx="3" fill="url(#logoGrad)"/>
    <rect x="108" y="136" width="22" height="8"  rx="3" fill="url(#logoGrad)"/>
  </g>

  <!-- L -->
  <g filter="url(#glow)">
    <rect x="140" y="76"  width="8"  height="68" rx="3" fill="url(#logoGrad)"/>
    <rect x="140" y="136" width="38" height="8"  rx="3" fill="url(#logoGrad)"/>
  </g>

  <!-- decorative accent dots -->
  <circle cx="42"  cy="112" r="3.5" fill="#e94560" opacity="0.7" filter="url(#glow)"/>
  <circle cx="214" cy="112" r="3.5" fill="#f5a623" opacity="0.7" filter="url(#glow)"/>

  <!-- bottom text: EasyLang -->
  <text
    x="128" y="195"
    font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
    font-size="17"
    font-weight="700"
    letter-spacing="4"
    text-anchor="middle"
    fill="url(#logoGrad)"
    filter="url(#textGlow)"
  >EASYLANG</text>

  <!-- version badge -->
  <rect x="93" y="208" width="70" height="22" rx="11" fill="#e94560" opacity="0.85"/>
  <text
    x="128" y="223"
    font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
    font-size="12"
    font-weight="700"
    letter-spacing="2"
    text-anchor="middle"
    fill="#fff"
  >EL1  v1.0</text>

  <!-- top-right sparkle -->
  <g transform="translate(204,44)" opacity="0.8" filter="url(#glow)">
    <line x1="0" y1="-12" x2="0" y2="12"  stroke="#f7d794" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-12" y1="0" x2="12" y2="0"  stroke="#f7d794" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-8" y1="-8" x2="8" y2="8"   stroke="#f7d794" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="-8"  x2="-8" y2="8"  stroke="#f7d794" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="3" fill="#f7d794"/>
  </g>

  <!-- bottom-left sparkle (smaller) -->
  <g transform="translate(44,210)" opacity="0.5" filter="url(#glow)">
    <line x1="0" y1="-7" x2="0" y2="7"  stroke="#e94560" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-7" y1="0" x2="7" y2="0"  stroke="#e94560" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2" fill="#e94560"/>
  </g>
</svg>
